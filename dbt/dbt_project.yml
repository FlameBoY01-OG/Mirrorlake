name: cdc_pipeline
version: '1.0.0'
config-version: 2
profile: cdc_pipeline

model-paths: ["models"]

# Layers: raw (CDC events produced by the Iceberg consumer, consumed here as a
# dbt source — see models/sources.yml) → cleaned (deduplicated) → metrics (aggregated).
models:
  cdc_pipeline:
    # The Iceberg REST catalog has no view support, which dbt-trino's incremental
    # merge relies on for staging. The cleaned layer is small, so re-derive it as a
    # table each run — dedup-by-LSN already makes this idempotent (replays collapse).
    cleaned:
      +materialized: table
    metrics:
      +materialized: table
